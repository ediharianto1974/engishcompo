<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Writing Hub - AI Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .metallic-card {
            background: linear-gradient(145deg, #ffffff, #f0f4ff);
            box-shadow: 10px 10px 20px #d1d9e6, -10px -10px 20px #ffffff;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .btn-metallic {
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-metallic:hover { transform: translateY(-2px); filter: brightness(1.1); }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .metallic-card { box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; }
            #writing-input { display: none !important; }
            .print-text-area { 
                display: block !important; 
                white-space: pre-wrap; 
                font-family: serif; 
                font-size: 1.2rem; 
                line-height: 1.8;
                padding: 20px;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
            }
        }
        .print-text-area { display: none; }
        
        /* Menghalang pemilihan teks untuk keselamatan tambahan */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans no-select">

    <div class="max-w-5xl mx-auto metallic-card rounded-[3rem] overflow-hidden">
        
        <div class="bg-indigo-700 p-8 text-white flex flex-wrap justify-between items-center gap-4 no-print">
            <div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">Writing Expert AI</h1>
                <p class="text-indigo-200 text-xs font-bold">Advanced Multilingual Engine</p>
            </div>
            
            <div class="flex flex-wrap gap-2">
                <select id="lang-mode" class="bg-indigo-800 text-white border-2 border-indigo-400 p-2 rounded-xl text-xs font-bold outline-none">
                    <option value="auto">🔍 Auto-Detect (Adv)</option>
                    <option value="en-GB">🇬🇧 English Only</option>
                    <option value="ms">🇲🇾 B. Melayu Only</option>
                </select>

                <select id="unit-select" class="bg-indigo-600 text-white border-2 border-indigo-400 p-2 rounded-xl text-xs font-bold outline-none cursor-pointer">
                    <option value="emergency">🚨 Unit 1: Emergency</option>
                    <option value="past">🕰️ Unit 2: Past Life</option>
                    <option value="adventure">🏔️ Unit 3: Adventure</option>
                    <option value="jobs">👨‍🚀 Unit 4: Cool Jobs</option>
                    <option value="transport">🚲 Unit 5: Transport</option>
                    <option value="made">🏭 Unit 6: How it's Made</option>
                    <option value="music">🎵 Unit 7: Music</option>
                    <option value="story">📚 Unit 8: Stories</option>
                    <option value="opinion">🗣️ Unit 9: Opinions</option>
                    <option value="mystery">🔍 Unit 10: Mystery</option>
                </select>
            </div>
        </div>

        <div class="p-6 md:p-12 space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-center">
                <div id="task-image-container" class="rounded-3xl overflow-hidden shadow-2xl h-64 border-4 border-white bg-gray-200">
                    <img id="task-image" src="https://images.unsplash.com/photo-1455390582262-044cdead277a?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover">
                </div>
                <div class="space-y-4">
                    <div class="inline-block bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-black uppercase tracking-widest">Writing Task</div>
                    <h2 id="question-text" class="text-xl font-bold text-gray-800 leading-tight italic">"Click Generate to start..."</h2>
                    
                    <div id="vocab-container" class="hidden p-4 bg-indigo-50 rounded-2xl border-2 border-indigo-100">
                        <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-2">Topic Specific Vocabulary:</p>
                        <div id="vocab-list" class="flex flex-wrap gap-2"></div>
                    </div>

                    <button onclick="generateTask()" class="btn-metallic text-white px-8 py-4 rounded-2xl font-black text-sm w-full no-print uppercase tracking-widest">GENERATE NEW TASK</button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-end px-2">
                    <label class="text-xs font-black text-gray-400 uppercase tracking-widest">Student's Composition</label>
                    <span id="word-count" class="text-xs font-mono font-bold bg-slate-200 px-3 py-1 rounded-lg">0 WORDS</span>
                </div>
                <textarea id="writing-input" spellcheck="false" oninput="updateUI()" placeholder="Start writing here..." 
                    class="w-full h-[300px] p-8 bg-white border-2 border-slate-100 rounded-[2.5rem] focus:border-indigo-400 outline-none text-xl leading-relaxed shadow-inner transition-all"></textarea>
                <div id="print-content" class="print-text-area"></div>

                <div class="flex flex-wrap gap-4 no-print">
                    <button id="btn-analyze" onclick="runRealAI()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl shadow-lg transition-all flex justify-center items-center gap-2 uppercase tracking-widest">
                        <span>Run Advanced Analysis</span>
                    </button>
                    <button onclick="sendToWhatsApp()" class="bg-[#25D366] hover:bg-[#128C7E] text-white px-8 py-5 rounded-2xl font-black shadow-lg transition-all flex items-center gap-2 uppercase tracking-widest">
                        <span>Send to WhatsApp</span>
                    </button>
                </div>
            </div>

            <div id="feedback-panel" class="hidden space-y-6">
                <hr class="border-slate-100">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="w-3 h-8 bg-indigo-600 rounded-full"></span>
                        <h3 class="text-xl font-black text-gray-800">AI Error Detection Report</h3>
                    </div>
                    <div id="detected-language" class="text-[10px] font-black px-4 py-2 bg-yellow-100 text-yellow-800 rounded-full uppercase">Detected: -</div>
                </div>
                
                <div id="feedback-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                <div id="detailed-issues" class="bg-red-50 p-6 rounded-3xl border-2 border-red-100">
                    <h4 class="text-sm font-black text-red-700 uppercase mb-4">Corrections & Suggestions:</h4>
                    <ul id="issue-list" class="space-y-3"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // FUNGSI KESELAMATAN (ANTI COPY-PASTE)
        // ==========================================
        
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'v' || e.key === 'V' || e.key === 'x' || e.key === 'X' || e.key === 'c' || e.key === 'C')) {
                e.preventDefault();
                if(e.key === 'v' || e.key === 'V') {
                    showStrictAlert();
                }
            }
        });

        const inputArea = document.getElementById('writing-input');
        inputArea.addEventListener('paste', function(e) {
            e.preventDefault();
            showStrictAlert();
        });

        inputArea.addEventListener('drop', function(e) {
            e.preventDefault();
            showStrictAlert();
        });

        function showStrictAlert() {
            alert("⚠️ AMARAN KERAS: JANGAN MENIRU!\n\nSila taip karangan anda sendiri secara manual. Penggunaan 'Copy-Paste' adalah dilarang sama sekali dalam sistem ini demi kejujuran akademik.");
        }

        // ==========================================
        // DATA SOALAN & VOCAB (5 SOALAN SETIAP UNIT)
        // ==========================================
        const prompts = {
            emergency: [
                { text: "A little boy is trapped in a lift. Write a story about his rescue.", vocab: ["trapped", "emergency", "rescue", "shouting", "elevator", "panic", "technician"] },
                { text: "You saw smoke coming from your neighbor's house. What did you do?", vocab: ["smoke", "neighbor", "fire", "emergency call", "brave", "immediately", "hose"] },
                { text: "A heavy flood hit your village suddenly. Describe how everyone stayed safe.", vocab: ["flood", "heavy rain", "evacuate", "safety", "cooperation", "riverbank", "belongings"] },
                { text: "You witnessed a car accident on your way to school. Describe the scene.", vocab: ["witnessed", "collision", "ambulance", "injured", "siren", "traffic", "shocked"] },
                { text: "Your younger sibling started choking on a small toy. How did you help?", vocab: ["choking", "first aid", "calm", "back blows", "save", "relieved", "emergency"] }
            ],
            past: [
                { text: "Describe life before electricity was common in villages.", vocab: ["kerosene lamp", "ancestors", "darkness", "traditional", "well water", "simple", "memories"] },
                { text: "Write about a traditional game you played with your grandparents.", vocab: ["traditional", "grandparents", "childhood", "outdoor", "joyful", "rules", "gathering"] },
                { text: "How did people communicate before smartphones existed?", vocab: ["letters", "post office", "telegram", "patiently", "handwritten", "stamps", "distance"] },
                { text: "Describe a visit to a historical museum and what you learned.", vocab: ["historical", "artifacts", "ancient", "heritage", "educational", "monument", "exhibition"] },
                { text: "Write about a famous legend or folklore from your hometown.", vocab: ["legend", "folklore", "myth", "generations", "moral lesson", "storyteller", "hero"] }
            ],
            adventure: [
                { text: "You found a mysterious cave while hiking. Describe your exploration.", vocab: ["mysterious", "exploration", "flashlight", "echo", "darkness", "discover", "stalactites"] },
                { text: "You and your friends got lost in a thick jungle. How did you find the way out?", vocab: ["lost", "thick jungle", "compass", "survival", "trail", "determination", "scary"] },
                { text: "Imagine you are part of a deep-sea exploration team. What do you see?", vocab: ["submarine", "deep sea", "creatures", "pressure", "underwater", "spectacular", "marine"] },
                { text: "Describe your experience climbing a high mountain for the first time.", vocab: ["climbing", "summit", "steep", "exhausted", "view", "peak", "equipment"] },
                { text: "You discovered an old treasure map in an attic. Where did it lead?", vocab: ["treasure", "map", "buried", "adventure", "clues", "island", "journey"] }
            ],
            jobs: [
                { text: "Describe the daily life and challenges of a brave firefighter.", vocab: ["firefighter", "duty", "uniform", "extinguish", "brave", "dangerous", "protective gear"] },
                { text: "What are the challenges and rewards of being a rural doctor?", vocab: ["doctor", "rural", "patients", "dedicated", "clinic", "medicine", "healthcare"] },
                { text: "Imagine being an astronaut on a mission to Mars.", vocab: ["astronaut", "mission", "gravity", "spacecraft", "galaxy", "orbit", "scientific"] },
                { text: "Describe the skills needed to be a successful professional chef.", vocab: ["chef", "culinary", "ingredients", "skillful", "recipe", "restaurant", "discipline"] },
                { text: "What is it like to be a wildlife photographer in the jungle?", vocab: ["wildlife", "patience", "nature", "camera", "environment", "capturing", "endangered"] }
            ],
            transport: [
                { text: "How will people travel to school in the year 2090?", vocab: ["futuristic", "flying cars", "technology", "efficient", "commute", "solar-powered", "advanced"] },
                { text: "Why is public transport important for a modern city?", vocab: ["public transport", "traffic jams", "convenient", "pollution", "affordable", "shuttle", "system"] },
                { text: "Describe a journey on a traditional boat along a large river.", vocab: ["traditional", "river", "rowing", "scenery", "tranquil", "navigation", "waterway"] },
                { text: "What are the advantages and disadvantages of traveling by plane?", vocab: ["distance", "boarding", "terminal", "expensive", "fast", "experience", "altitude"] },
                { text: "Should all cars be replaced by bicycles? Give your reasons.", vocab: ["bicycles", "environment", "healthy", "carbon footprint", "exercise", "parking", "reduce"] }
            ],
            made: [
                { text: "Describe how traditional batik is made in Malaysia.", vocab: ["batik", "wax", "dye", "pattern", "handmade", "fabric", "traditional"] },
                { text: "Explain the process of making a traditional kite (wau).", vocab: ["wau", "bamboo", "frame", "colorful", "decoration", "balanced", "flying"] },
                { text: "How is chocolate produced from cocoa beans? Describe the journey.", vocab: ["cocoa beans", "process", "fermentation", "factory", "roasting", "delicious", "production"] },
                { text: "Describe the steps of preparing a traditional dish like Nasi Lemak.", vocab: ["ingredients", "steps", "preparation", "aroma", "authentic", "cooking", "delicious"] },
                { text: "How is recycled paper made at home? Explain the process.", vocab: ["recycled", "pulp", "soak", "screen", "environment", "creative", "waste"] }
            ],
            music: [
                { text: "What is your favorite musical instrument and why?", vocab: ["instrument", "melody", "rhythm", "practice", "passion", "soothing", "performance"] },
                { text: "Describe the atmosphere of a live music performance you attended.", vocab: ["atmosphere", "crowd", "stage", "cheering", "unforgettable", "vibration", "amplifiers"] },
                { text: "How does listening to music help you study or relax?", vocab: ["relax", "concentration", "background", "calm", "lyrics", "emotional", "benefits"] },
                { text: "Describe a traditional musical performance in your country.", vocab: ["performance", "traditional", "heritage", "costumes", "culture", "ensemble", "legacy"] },
                { text: "If you could write a song, what would it be about?", vocab: ["lyrics", "composer", "inspiration", "message", "tune", "creative", "meaningful"] }
            ],
            story: [
                { text: "Write a story about a dragon who wanted to be a chef.", vocab: ["dragon", "chef", "fantasy", "cooking", "kingdom", "unique", "friendship"] },
                { text: "You found a talking cat on your way home. What happened next?", vocab: ["talking cat", "mysterious", "adventure", "surprised", "secret", "companion", "dialogue"] },
                { text: "Write a story that ends with: '...I will never forget that day.'", vocab: ["lesson", "memory", "climax", "incident", "realization", "event", "emotion"] },
                { text: "A robot becomes the new student in your class. Describe the day.", vocab: ["robot", "classmate", "amazed", "helping", "future", "interaction", "electronic"] },
                { text: "You woke up and realized you have the power to be invisible.", vocab: ["invisible", "power", "mischief", "secret", "realized", "advantages", "unexpected"] }
            ],
            opinion: [
                { text: "Should students be allowed to use tablets in school?", vocab: ["tablets", "education", "distraction", "learning tool", "opinion", "agree", "modern"] },
                { text: "Is it better to live in a busy city or a quiet village?", vocab: ["city", "village", "facilities", "peaceful", "lifestyle", "comparison", "pollution"] },
                { text: "Is social media good or bad for teenagers today?", vocab: ["social media", "connection", "cyberbullying", "awareness", "harmful", "responsible", "influence"] },
                { text: "Should homework be abolished in primary schools?", vocab: ["homework", "abolished", "free time", "stress", "revision", "academic", "balance"] },
                { text: "Is it important for every student to learn a second language?", vocab: ["communication", "global", "opportunity", "bilingual", "advantage", "culture", "fluency"] }
            ],
            mystery: [
                { text: "Describe a mysterious sound coming from your attic at night.", vocab: ["mysterious", "attic", "creaky", "investigate", "shadow", "frightened", "whisper"] },
                { text: "A famous painting disappeared from a local museum. How was it solved?", vocab: ["disappeared", "museum", "detective", "clue", "suspect", "stolen", "solved"] },
                { text: "You found a locked wooden box buried in your backyard.", vocab: ["locked box", "buried", "backyard", "key", "contents", "curiosity", "secret"] },
                { text: "A person you know suddenly started acting very strangely.", vocab: ["strange", "behavior", "suspicious", "mystery", "clues", "secretive", "discovery"] },
                { text: "Describe a mysterious island that does not appear on any map.", vocab: ["hidden", "island", "uncharted", "mystical", "fog", "adventure", "survival"] }
            ]
        };

const imageIds = {
            // Unit 1: Emergency (Gambar lampu kecemasan/ambulans)
            emergency: "1580193132038-04e8d387085c", 
            
            past: "1526778548025-fa2f459cd5c1",
            adventure: "1533240332313-0db49b459ad6",
            
            // Unit 4: Cool Jobs (Gambar orang bekerja/profesional)
            jobs: "1521791136064-7986c29535a0",
            
            transport: "1449824913935-59a10b8d2000",
            made: "1581091226825-a6a2a5aee158",
            music: "1511379938547-c1f69419868d",
            story: "1532012197267-da84d127e765",
            
            // Unit 9: Opinions (Gambar orang berbincang/pendapat)
            opinion: "1523240795612-9a054b0db644",
            
            mystery: "1501594907352-04cda38ebc29"
        };

        let currentStats = { grammar: 0, spelling: 0, punctuation: 0, style: 0 };
        let currentMatches = [];

        function generateTask() {
            const unit = document.getElementById('unit-select').value;
            const unitTasks = prompts[unit];
            // Randomly select one question from the 5 available
            const selectedTask = unitTasks[Math.floor(Math.random() * unitTasks.length)];
            
            // Set question text
            document.getElementById('question-text').innerText = `"${selectedTask.text}"`;
            
            // Set image
            document.getElementById('task-image').src = `https://images.unsplash.com/photo-${imageIds[unit]}?auto=format&fit=crop&w=800&q=80`;
            
            // Generate vocab list specifically for this question
            const vocabList = document.getElementById('vocab-list');
            vocabList.innerHTML = "";
            selectedTask.vocab.forEach(word => {
                const span = document.createElement('span');
                span.className = "bg-white text-indigo-700 px-3 py-1 rounded-full text-[10px] font-bold border border-indigo-200 shadow-sm";
                span.innerText = word;
                vocabList.appendChild(span);
            });
            
            document.getElementById('vocab-container').classList.remove('hidden');
            document.getElementById('writing-input').value = "";
            document.getElementById('feedback-panel').classList.add('hidden');
            updateUI();
        }

        function updateUI() {
            const val = document.getElementById('writing-input').value;
            document.getElementById('word-count').innerText = `${val.trim() ? val.trim().split(/\s+/).length : 0} WORDS`;
            document.getElementById('print-content').innerText = val;
        }

        async function runRealAI() {
            const text = document.getElementById('writing-input').value.trim();
            if (!text) return alert("Please write something first!");
            
            const btn = document.getElementById('btn-analyze');
            const langMode = document.getElementById('lang-mode').value;
            
            btn.innerText = "Analyzing...";
            btn.disabled = true;

            try {
                const bodyParams = new URLSearchParams();
                bodyParams.append('text', text);
                bodyParams.append('language', langMode);

                const response = await fetch('https://api.languagetool.org/v2/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: bodyParams
                });
                
                if (!response.ok) throw new Error("Server Error " + response.status);
                
                const data = await response.json();
                
                if (text.length > 0 && !/[.!?]$/.test(text)) {
                    data.matches.push({
                        message: "Sentence might not end with punctuation.",
                        offset: text.length - 1,
                        length: 1,
                        rule: { category: { id: 'PUNCTUATION', name: 'Punctuation' }, issueType: 'punctuation' },
                        replacements: [{ value: text.slice(-1) + "." }]
                    });
                }

                currentMatches = data.matches;
                processAIResults(data.matches, text);
            } catch (e) {
                alert("AI Server busy. Please try again.");
            } finally {
                btn.innerText = "Run Advanced Analysis";
                btn.disabled = false;
            }
        }

        function processAIResults(matches, text) {
            let stats = { grammar: 0, spelling: 0, punctuation: 0, style: 0 };
            const list = document.getElementById('issue-list');
            list.innerHTML = "";
            
            matches.forEach(m => {
                const cat = m.rule.category.id;
                const issueType = m.rule.issueType;

                if (issueType === 'misspelling') stats.spelling++;
                else if (['PUNCTUATION', 'TYPOGRAPHY', 'WHITESPACE', 'CASING'].includes(cat)) stats.punctuation++;
                else if (['STYLE', 'REDUNDANCY'].includes(cat)) stats.style++;
                else stats.grammar++;
                
                const err = text.substring(m.offset, m.offset + m.length);
                const sug = m.replacements.slice(0, 2).map(r => r.value).join(', ');
                
                const li = document.createElement('li');
                li.className = "p-4 bg-white rounded-xl border border-red-200 text-sm";
                li.innerHTML = `
                    <div class="mb-1">
                        <span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-[10px] font-black uppercase mr-2">${m.rule.category.name}</span> 
                        <span class="font-bold">"${err || 'space'}"</span>
                    </div>
                    <div class="text-gray-600 italic">${m.message} ${sug ? '➡ Try: <b>' + sug + '</b>' : ''}</div>
                `;
                list.appendChild(li);
            });

            currentStats = stats;
            renderGrid(stats);
            document.getElementById('feedback-panel').classList.remove('hidden');
        }

        function renderGrid(s) {
            const grid = document.getElementById('feedback-grid');
            const data = [
                {t: "Spelling", v: s.spelling}, {t: "Grammar", v: s.grammar}, 
                {t: "Punctuation", v: s.punctuation}, {t: "Style", v: s.style}
            ];
            grid.innerHTML = data.map(i => `
                <div class="p-4 rounded-2xl border-2 ${i.v === 0 ? 'bg-green-50 border-green-100 text-green-700' : 'bg-red-50 border-red-100 text-red-700'} text-center">
                    <p class="text-[9px] font-black uppercase opacity-60">${i.t}</p>
                    <p class="text-lg font-bold">${i.v === 0 ? "Perfect" : i.v + " Issues"}</p>
                </div>
            `).join('');
        }

        function sendToWhatsApp() {
            const text = document.getElementById('writing-input').value.trim();
            if (!text) return alert("Sila buat karangan dan jalankan analisis terlebih dahulu!");

            const name = prompt("Masukkan Nama Pelajar:");
            if (!name) return;
            const cls = prompt("Masukkan Kelas Pelajar:");
            if (!cls) return;

            let message = `*📊 WRITING ANALYSIS REPORT*\n`;
            message += `------------------------------------\n`;
            message += `*Name:* ${name.toUpperCase()}\n`;
            message += `*Class:* ${cls.toUpperCase()}\n`;
            message += `*Date:* ${new Date().toLocaleDateString('en-GB')}\n\n`;

            message += `*📝 STUDENT COMPOSITION:*\n`;
            message += `_"${text}"_\n\n`;

            message += `*📈 ANALYSIS SUMMARY:*\n`;
            message += `• Spelling: ${currentStats.spelling} issues\n`;
            message += `• Grammar: ${currentStats.grammar} issues\n`;
            message += `• Punctuation: ${currentStats.punctuation} issues\n`;
            message += `• Style: ${currentStats.style} issues\n\n`;

            if (currentMatches.length > 0) {
                message += `*💡 KEY CORRECTIONS:*\n`;
                currentMatches.slice(0, 8).forEach((m, index) => {
                    const err = text.substring(m.offset, m.offset + m.length);
                    const sug = m.replacements.length > 0 ? m.replacements[0].value : 'N/A';
                    message += `${index + 1}. [${m.rule.category.name}] "${err}" ➡ *${sug}*\n`;
                });
            } else {
                message += `*🎉 EXCELLENT!* No major issues found.`;
            }

            message += `\n------------------------------------\n`;
            message += `_Generated by Writing Expert AI_`;

            const phone = "60106607787";
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${phone}?text=${encodedMessage}`, '_blank');
        }
    </script>
</body>
</html>
